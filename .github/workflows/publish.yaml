name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:  # Manual trigger
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.1)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Set version from release tag
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Update all package versions (@emdzej/* and plugins)
          pnpm --filter "@emdzej/*" exec npm pkg set version="$VERSION"
          pnpm --filter "ragclaw-plugin-*" exec npm pkg set version="$VERSION"

      - name: Publish @emdzej/ragclaw-core
        working-directory: packages/core
        run: npm publish --access public --provenance

      - name: Publish @emdzej/ragclaw-cli
        working-directory: packages/cli
        run: npm publish --access public --provenance

      - name: Publish @emdzej/ragclaw-mcp
        working-directory: packages/mcp
        run: npm publish --access public --provenance

      - name: Publish ragclaw-plugin-github
        working-directory: plugins/ragclaw-plugin-github
        run: npm publish --access public --provenance

      - name: Publish ragclaw-plugin-obsidian
        working-directory: plugins/ragclaw-plugin-obsidian
        run: npm publish --access public --provenance

      - name: Publish ragclaw-plugin-youtube
        working-directory: plugins/ragclaw-plugin-youtube
        run: npm publish --access public --provenance
